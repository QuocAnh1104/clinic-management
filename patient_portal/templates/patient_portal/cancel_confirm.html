{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white"><h4 class="mb-0">Xác nhận hủy lịch hẹn</h4></div>
            <div class="card-body">
                <p>Bạn có chắc muốn hủy lịch hẹn này?</p>
                <table class="table">
                    <tr><th>Bác sĩ:</th><td>BS. {{ appointment.doctor.get_full_name|default:appointment.doctor.username }}</td></tr>
                    <tr><th>Thời gian:</th><td>{{ appointment.appt_datetime|date:"H:i - d/m/Y" }}</td></tr>
                </table>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Xác nhận hủy</button>
                    <a href="{% url 'patient_portal:my_appointments' %}" class="btn btn-secondary">Quay lại</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
