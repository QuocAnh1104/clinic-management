{% extends 'base.html' %}
{% block content %}
<div class="card">
    <div class="card-header bg-danger text-white">
        <h4 class="mb-0">Xác nhận xóa</h4>
    </div>
    <div class="card-body">
        <p>Bạn có chắc muốn ẩn thuốc <strong>{{ medicine.medicine_name }}</strong> khỏi danh mục?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Xác nhận xóa</button>
            <a href="{% url 'pharmacy:medicine_list' %}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</div>
{% endblock %}
